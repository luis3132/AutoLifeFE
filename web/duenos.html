<!DOCTYPE html>

<html>
    <head>
        <title>Gestión de Duenos</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" 
              rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" 
              crossorigin="anonymous">
        <style>
            .divider {
                height: 1px;
                background-color: rgba(0, 0, 0, .15);
            }
            .text-justify {
                text-align: justify;
            }
        </style>
    </head>
    <body>
        <section class="container">
            <div class="row align-items-center mb-4">
                <span class="fw-bold w-auto">Administración de Duenos</span>
                <button class="btn btn-primary w-auto" onclick="window.location='form_crear_vehiculo.html'">
                    Nuevo Dueno
                </button>
                </div>
            <div class="divider"></div>
            <table class="table table-striped table-bordered mt-4">
                <thead>
                    <tr class="table-bordered">
                        <th id="idd" scope="col">Id </th>
                        <th id="usuario" scope="col">Usuario</th>
                        <th id="vehiculo" scope="col">Vehiculo</th>
                        <th id="kms" scope="col">Kilometraje Inicio</th>
                        <th id="kmf" scope="col">Kilometraje Final</th>
                        <th id="dates" scope="col">Dia Inicio</th>
                        <th id="datef" scope="col">Dia Final</th>
                        <th id="ciudad-promedio" scope="col">Ciudad promedio</th>
                    </tr>
                </thead>
                <tbody id="duenos-table">
                </tbody>
            </table>
        </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" 
    crossorigin="anonymous"></script>
    <script src="js/request.js"></script>
    <script src="js/vehiculo.js"></script>
    <script>
        window.onload = function(){
            loadData(); 
        }
    </script>
    </body>
</html>
